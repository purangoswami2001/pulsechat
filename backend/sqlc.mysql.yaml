version: "2"
sql:
  - engine: "mysql"
    schema: "internal/db/mysql/schema.sql"
    queries: "internal/db/mysql/queries/"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/mysql/sqlc"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
