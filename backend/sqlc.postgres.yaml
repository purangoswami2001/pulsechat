version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/db/postgres/schema.sql"
    queries: "internal/db/postgres/queries/"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/postgres/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamp with time zone"
            go_type: "time.Time"
